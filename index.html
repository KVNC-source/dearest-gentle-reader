<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dearest Gentle Reader</title>

    <!-- CSS -->
    <link rel="stylesheet" href="landing.css" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Invitation Content -->
    <main class="content">
      <h1>Dearest Gentle Reader</h1>

      <div class="ornament">❦</div>

      <p class="subtitle">The whispers of my heart are about to unfold...</p>

      <button id="enterBtn">Unravel</button>
    </main>

    <!-- Decorative Bee -->
    <div class="wrap">
      <div class="wrap2">
        <div class="body"></div>

        <div class="wing1"></div>
        <div class="wing2"></div>

        <div class="head"></div>
        <div class="stinger"></div>
      </div>
    </div>

    <!-- Background Music -->
    <audio id="bgmusic">
      <source
        src="assets/pov - Cover by Strings From Paris [Bridgerton Season 3 Netflix Series].mp3"
        type="audio/mpeg"
      />
    </audio>

    <!-- JavaScript -->
    <script src="landing.js"></script>
  </body>
</html>
